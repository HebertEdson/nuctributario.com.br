<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consulta CNPJ — Núcleo Tributário</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --nt-blue: #1d3461;
    --nt-blue-light: #264a8a;
    --white: #ffffff;
    --gray-50: #f8fafc;
    --gray-100: #f1f5f9;
    --gray-200: #e2e8f0;
    --gray-400: #94a3b8;
    --gray-600: #475569;
    --gray-700: #334155;
    --gray-900: #0f172a;
    --green: #22c55e;
    --red: #ef4444;
    --amber: #f59e0b;
    --blue-badge-bg: #dbeafe;
    --blue-badge-fg: #1e40af;
    --amber-bg: #fef9ec;
    --sky-50: #f0f9ff;
    --sky-200: #bae6fd;
    --sky-700: #0369a1;
    --white-60: rgba(255,255,255,0.6);
  }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--gray-100);
    min-height: 100vh;
    color: var(--gray-900);
  }

  /* ── HEADER ── */
  .page-header {
    background: var(--nt-blue);
    padding: 28px 24px 0;
    text-align: center;
  }
  .page-header h1 {
    color: var(--white);
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  .page-header p {
    color: var(--white-60);
    font-size: 13px;
    margin-top: 4px;
  }

  /* ── SEARCH BAR ── */
  .search-wrap {
    background: var(--nt-blue);
    padding: 20px 16px 32px;
    display: flex;
    justify-content: center;
  }
  .search-box {
    background: var(--white);
    border-radius: 12px;
    display: flex;
    align-items: center;
    overflow: hidden;
    width: 100%;
    max-width: 560px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.2);
  }
  .search-box input {
    flex: 1;
    border: none;
    outline: none;
    padding: 16px 20px;
    font-size: 17px;
    font-weight: 600;
    color: var(--nt-blue);
    letter-spacing: 1.5px;
    font-family: inherit;
  }
  .search-box input::placeholder {
    color: var(--gray-400);
    font-weight: 400;
    letter-spacing: 0;
  }
  .search-box button {
    background: var(--nt-blue);
    color: var(--white);
    border: none;
    padding: 0 24px;
    height: 56px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    letter-spacing: 0.3px;
    font-family: inherit;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .search-box button:hover { background: var(--nt-blue-light); }
  .search-box button:disabled { opacity: 0.6; cursor: not-allowed; }

  /* ── MAIN CONTAINER ── */
  .container {
    max-width: 640px;
    margin: 0 auto;
    padding: 24px 16px 60px;
  }

  /* ── RESULT CARD ── */
  .card {
    background: var(--white);
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.09);
    display: none;
  }
  .card.visible { display: block; }

  .card-hero {
    background: var(--nt-blue);
    padding: 16px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .badge {
    font-size: 11px;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 999px;
    letter-spacing: 0.4px;
  }
  .badge-ativa { background: var(--green); color: var(--white); }
  .badge-baixada { background: var(--red); color: var(--white); }
  .badge-inapta { background: var(--amber); color: var(--white); }
  .card-since { color: var(--white-60); font-size: 12px; }

  .card-empresa {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--gray-100);
  }
  .razao-social {
    font-size: 17px;
    font-weight: 800;
    color: var(--nt-blue);
    line-height: 1.25;
  }
  .nome-fantasia {
    font-size: 13px;
    color: var(--gray-600);
    margin-top: 4px;
  }
  .meta-row {
    display: flex;
    flex-wrap: wrap;
    gap: 4px 18px;
    margin-top: 10px;
  }
  .meta-item { font-size: 12px; color: var(--gray-600); }
  .meta-item strong { color: var(--nt-blue); }

  /* ── SECTIONS ── */
  .section {
    padding: 16px 24px;
    border-bottom: 1px solid var(--gray-100);
  }
  .section:last-child { border-bottom: none; }
  .section-title {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--gray-400);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .grid2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .field label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--gray-400);
    display: block;
    margin-bottom: 2px;
  }
  .field span {
    font-size: 14px;
    font-weight: 600;
    color: var(--nt-blue);
  }

  .regime-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--blue-badge-bg);
    color: var(--blue-badge-fg);
    font-size: 14px;
    font-weight: 700;
    padding: 8px 16px;
    border-radius: 8px;
  }

  .contact-row {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    font-size: 13px;
    color: var(--gray-700);
    margin-bottom: 8px;
  }
  .contact-row:last-child { margin-bottom: 0; }
  .contact-icon { font-size: 15px; flex-shrink: 0; margin-top: 1px; }

  .socio-row {
    background: var(--gray-50);
    border-radius: 8px;
    padding: 10px 14px;
    margin-bottom: 8px;
  }
  .socio-row:last-child { margin-bottom: 0; }
  .socio-nome { font-size: 13px; font-weight: 700; color: var(--nt-blue); }
  .socio-qual { font-size: 11px; color: var(--gray-600); margin-top: 2px; }

  .processo-row {
    background: var(--amber-bg);
    border-left: 3px solid var(--amber);
    border-radius: 0 8px 8px 0;
    padding: 10px 14px;
    margin-bottom: 8px;
  }
  .processo-row:last-child { margin-bottom: 0; }
  .processo-num { font-size: 12px; font-weight: 700; color: var(--nt-blue); }
  .processo-meta { font-size: 11px; color: var(--gray-600); margin-top: 2px; }

  .empty-state {
    text-align: center;
    padding: 12px 0;
    color: var(--gray-400);
    font-size: 13px;
  }

  .datajud-notice {
    background: var(--sky-50);
    border: 1px solid var(--sky-200);
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 12px;
    color: var(--sky-700);
    line-height: 1.5;
  }
  .datajud-notice a { color: var(--sky-700); font-weight: 600; }

  /* ── SPINNER ── */
  .spinner-wrap {
    display: none;
    justify-content: center;
    align-items: center;
    padding: 48px 0;
    gap: 12px;
    color: var(--gray-600);
    font-size: 14px;
  }
  .spinner-wrap.visible { display: flex; }
  .spinner {
    width: 24px;
    height: 24px;
    border: 3px solid var(--gray-200);
    border-top-color: var(--nt-blue);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (prefers-reduced-motion: reduce) {
    .spinner { animation: none; border-top-color: var(--nt-blue); }
  }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--gray-900);
    color: var(--white);
    padding: 12px 20px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    transition: transform 0.25s ease;
    z-index: 1000;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.error { background: var(--red); }
</style>
</head>
<body>

<header class="page-header">
  <h1>Consulta de CNPJ</h1>
  <p>Regime tributário, sócios e processos judiciais</p>
</header>

<div class="search-wrap">
  <div class="search-box">
    <input
      type="text"
      id="cnpjInput"
      placeholder="00.000.000/0000-00"
      maxlength="18"
      inputmode="numeric"
      aria-label="CNPJ da empresa"
    >
    <button id="searchBtn" onclick="handleSearch()">
      🔍 Buscar
    </button>
  </div>
</div>

<main class="container">
  <div class="spinner-wrap" id="spinner">
    <div class="spinner"></div>
    Consultando...
  </div>

  <div class="card" id="resultCard">
    <!-- preenchido por renderCard() -->
  </div>
</main>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
  // ── CONFIGURAÇÃO ──────────────────────────────────────────
  const DATAJUD_API_KEY = ''; // coloque sua chave aqui: datajud.cnj.jus.br
  // ─────────────────────────────────────────────────────────

  const input = document.getElementById('cnpjInput');
  const searchBtn = document.getElementById('searchBtn');

  // Auto-formata enquanto digita: 00.000.000/0000-00
  input.addEventListener('input', () => {
    let v = input.value.replace(/\D/g, '').slice(0, 14);
    if (v.length > 12) v = v.slice(0,2)+'.'+v.slice(2,5)+'.'+v.slice(5,8)+'/'+v.slice(8,12)+'-'+v.slice(12);
    else if (v.length > 8) v = v.slice(0,2)+'.'+v.slice(2,5)+'.'+v.slice(5,8)+'/'+v.slice(8);
    else if (v.length > 5) v = v.slice(0,2)+'.'+v.slice(2,5)+'.'+v.slice(5);
    else if (v.length > 2) v = v.slice(0,2)+'.'+v.slice(2);
    input.value = v;
  });

  // Enter aciona busca
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') handleSearch();
  });

  // Escapa strings da API antes de injetar em innerHTML — previne XSS
  function escapeHTML(str) {
    if (str == null) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  function getRawCNPJ() {
    return input.value.replace(/\D/g, '');
  }

  function validateCNPJ(cnpj) {
    if (cnpj.length !== 14) return false;
    if (/^(\d)\1+$/.test(cnpj)) return false;

    const calc = (len) => {
      let sum = 0, pos = len - 7;
      for (let i = len; i >= 1; i--) {
        sum += parseInt(cnpj[len - i]) * pos--;
        if (pos < 2) pos = 9;
      }
      return sum % 11 < 2 ? 0 : 11 - (sum % 11);
    };

    return calc(12) === parseInt(cnpj[12]) && calc(13) === parseInt(cnpj[13]);
  }

  function handleSearch() {
    const raw = getRawCNPJ();
    if (!validateCNPJ(raw)) {
      showToast('CNPJ inválido — verifique os dígitos', true);
      return;
    }
    console.log('CNPJ válido:', raw);
  }

  // ── UI HELPERS ────────────────────────────────────────────

  const spinner = document.getElementById('spinner');
  const resultCard = document.getElementById('resultCard');
  const toast = document.getElementById('toast');
  let toastTimer = null;

  function showToast(msg, isError = false) {
    clearTimeout(toastTimer);
    toast.textContent = msg;
    toast.className = 'toast show' + (isError ? ' error' : '');
    toastTimer = setTimeout(() => { toast.className = 'toast'; }, 3500);
  }

  function setLoading(on) {
    searchBtn.disabled = on;
    spinner.classList.toggle('visible', on);
    if (on) resultCard.classList.remove('visible');
  }
</script>

</body>
</html>
