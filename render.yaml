services:
  - type: web
    name: nuctributario
    runtime: node
    rootDir: nuctributario
    buildCommand: npm install
    startCommand: node server.js
    plan: free
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: FORMSPREE_URL
        value: https://formspree.io/f/mkoagwdj
      - key: PORT
        value: 3000
